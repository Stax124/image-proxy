name: Docker

on:
    push:
        tags:
            - "*"
        branches:
            - main
            - rework-docker-ci # Temporary branch for testing new CI configuration, can be removed after successful merge

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    packages: write

jobs:
    check-version:
        name: Ensure Tag Matches Cargo.toml
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/')
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6
              with:
                  submodules: recursive
            - name: Check Cargo Version Matches Tag
              uses: spice-labs-inc/action-check-version@main

    build:
        needs: check-version
        if: always() && (needs.check-version.result == 'success' ||
            needs.check-version.result == 'skipped')
        uses: docker/github-builder/.github/workflows/build.yml@v1
        permissions:
            contents: read
            packages: write
            id-token: write
        with:
            output: image
            push: true
            platforms: linux/amd64,linux/arm64
            context: .
            file: ./Dockerfile
            cache: true
            meta-images: ghcr.io/stax124/image-proxy
            meta-tags: |
                type=ref,event=branch
                type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
                type=semver,pattern={{version}}
                type=semver,pattern={{major}}.{{minor}}
        secrets:
            registry-auths: |
                - registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
