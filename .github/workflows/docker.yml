name: Docker

on:
    push:
        tags:
            - "v*"
        branches:
            - main

env:
    CARGO_TERM_COLOR: always
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    check-version:
        name: Ensure Tag Matches Cargo.toml
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/')
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6
              with:
                  submodules: recursive
            - name: Check Cargo Version Matches Tag
              uses: spice-labs-inc/action-check-version@main
    build-and-push:
        runs-on: ubuntu-latest
        needs: check-version
        if: always() && (needs.check-version.result == 'success' || needs.check-version.result == 'skipped')
        permissions:
            contents: read
            packages: write # Required to push to GHCR
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  submodules: recursive
            - name: Log in to the Container registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Extract metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  # This automatically creates:
                  #   ghcr.io/OWNER/REPO:1.2.3
                  #   ghcr.io/OWNER/REPO:latest   (when you push a tag)
                  tags: |
                      type=semver,pattern={{version}}
                      type=raw,value=latest,enable={{is_default_branch}}
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./Dockerfile # Change if your Dockerfile is elsewhere
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  # Optional: enable Buildx cache for faster subsequent builds
                  cache-from: type=gha
                  cache-to: type=gha
