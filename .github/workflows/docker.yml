name: Docker

on:
    push:
        tags:
            - "v*"
        branches:
            - main

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    CARGO_TERM_COLOR: always
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    check-version:
        name: Ensure Tag Matches Cargo.toml
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/')
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6
              with:
                  submodules: recursive
            - name: Check Cargo Version Matches Tag
              uses: spice-labs-inc/action-check-version@main
    build:
        name: Build (${{ matrix.platform }})
        runs-on: ${{ matrix.runner }}
        needs: check-version
        if: always() && (needs.check-version.result == 'success' || needs.check-version.result == 'skipped')
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: linux/amd64
                      runner: ubuntu-latest
                      arch: amd64
                    - platform: linux/arm64
                      runner: ubuntu-24.04-arm
                      arch: arm64
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  submodules: recursive
            - name: Log in to the Container registry
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4
            - name: Build Docker image
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./Dockerfile
                  platforms: ${{ matrix.platform }}
                  push: true
                  tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-${{ matrix.arch }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    manifest:
        name: Create final manifest
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Log in to the Container registry
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Create and push multi-arch manifest
              run: |
                  docker buildx imagetools create \
                  -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-amd64 \
                  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-arm64
            - name: Tag as latest (on main branch)
              if: github.ref == 'refs/heads/main'
              run: |
                  docker buildx imagetools create \
                  -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
                  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
