[package]
name = "image-proxy"
version = "0.5.0"
edition = "2024"

[dependencies]
actix-files = { version = "0.6.10", features = ["experimental-io-uring"] }
actix-web = "4.13.0"
anyhow = "1.0.102"
image = { version = "0.25.10", features = ["nasm", "avif-native"] }
reqwest = { version = "0.13.2", features = ["http2"] }
tokio = { version = "1.50.0", features = ["full"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
webp = "0.3.1"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
