[package]
name = "image-proxy"
version = "0.2.0"
edition = "2024"

[dependencies]
actix-web = "4.13.0"
anyhow = "1.0.102"
image = { version = "0.25.10", features = ["nasm", "avif-native"] }
reqwest = { version = "0.13.2", features = ["http2"] }
